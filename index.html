<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MercadoList</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "clean-blue": "#3B82F6",
              "clean-green": "#10B981",
              "clean-orange": "#F59E0B",
              "clean-purple": "#8B5CF6",
              "clean-gray": "#6B7280",
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="style.css" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#000000" />
  </head>
  <body
    class="bg-gradient-to-br from-gray-50 via-blue-50 to-purple-50 min-h-screen"
  >
    <div class="max-w-2xl mx-auto px-4 py-6">
      <!-- Header -->
      <header class="mb-8">
        <div class="flex items-center justify-between">
          <div>
            <h1
              class="text-3xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent"
            >
              🛒 MercadoList
            </h1>
            <p class="text-gray-500 text-sm mt-1">
              Sua lista inteligente de compras
            </p>
          </div>
          <button
            id="btnClearAll"
            class="px-4 py-2 text-sm text-red-500 hover:bg-red-50 rounded-xl transition-all"
          >
            <svg
              class="w-5 h-5 inline-block mr-1"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
              ></path>
            </svg>
            Limpar
          </button>
        </div>
      </header>

      <!-- Stats Dashboard -->
      <div class="grid grid-cols-2 gap-4 mb-6">
        <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100">
          <div class="flex items-center justify-between mb-2">
            <p class="text-xs text-gray-500 font-medium">ITENS NO CARRINHO</p>
            <span class="text-2xl">🛍️</span>
          </div>
          <div class="flex items-end gap-2">
            <p id="checkedCount" class="text-3xl font-bold text-green-600">0</p>
            <p class="text-gray-400 text-sm mb-1">
              / <span id="totalCount">0</span>
            </p>
          </div>
          <!-- Progress Bar -->
          <div class="mt-3 bg-gray-100 rounded-full h-2 overflow-hidden">
            <div
              id="progressBar"
              class="progress-bar bg-gradient-to-r from-green-400 to-green-600 h-full rounded-full"
              style="width: 0%"
            ></div>
          </div>
          <p id="progressText" class="text-xs text-gray-400 mt-2">
            0% concluído
          </p>
        </div>

        <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100">
          <div class="flex items-center justify-between mb-2">
            <p class="text-xs text-gray-500 font-medium">TOTAL ESTIMADO</p>
            <span class="text-2xl">💰</span>
          </div>
          <p id="totalEstimated" class="text-2xl font-bold text-gray-800">
            R$ 0,00
          </p>
          <p id="totalInCart" class="text-xs text-green-600 mt-1">
            R$ 0,00 no carrinho
          </p>
        </div>
      </div>

      <!-- Category Filter -->
      <div class="mb-6">
        <div class="flex items-center justify-between mb-3">
          <p class="text-sm font-semibold text-gray-700">
            Filtrar por categoria
          </p>
          <button
            id="btnClearFilter"
            class="text-xs text-blue-500 hover:text-blue-700 hidden"
          >
            Limpar filtro
          </button>
        </div>
        <div
          id="categoryFilter"
          class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide"
        >
          <button
            class="category-pill flex-shrink-0 px-4 py-2 rounded-xl text-sm font-medium border-2 border-blue-500 bg-blue-50 text-blue-600"
            data-filter="all"
          >
            📋 Todos
          </button>
          <button
            class="category-pill flex-shrink-0 px-4 py-2 rounded-xl text-sm font-medium border-2 border-gray-100 text-gray-600 hover:border-gray-200"
            data-filter="Limpeza"
          >
            🧽 Limpeza
          </button>
          <button
            class="category-pill flex-shrink-0 px-4 py-2 rounded-xl text-sm font-medium border-2 border-gray-100 text-gray-600 hover:border-gray-200"
            data-filter="Geladeira"
          >
            ❄️ Geladeira
          </button>
          <button
            class="category-pill flex-shrink-0 px-4 py-2 rounded-xl text-sm font-medium border-2 border-gray-100 text-gray-600 hover:border-gray-200"
            data-filter="Armário"
          >
            🍞 Armário
          </button>
          <button
            class="category-pill flex-shrink-0 px-4 py-2 rounded-xl text-sm font-medium border-2 border-gray-100 text-gray-600 hover:border-gray-200"
            data-filter="Higiene"
          >
            🧴 Higiene
          </button>
          <button
            class="category-pill flex-shrink-0 px-4 py-2 rounded-xl text-sm font-medium border-2 border-gray-100 text-gray-600 hover:border-gray-200"
            data-filter="Outros"
          >
            📦 Outros
          </button>
        </div>
      </div>

      <!-- Items List -->
      <main class="mb-16">
        <div id="itemsList" class="space-y-3">
          <!-- Items will be rendered here -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden text-center py-16">
          <div class="text-6xl mb-4">🛒</div>
          <h3 class="text-xl font-semibold text-gray-700 mb-2">
            Sua lista está vazia
          </h3>
          <p class="text-gray-400">Toque no botão + para adicionar itens</p>
        </div>
      </main>

      <!-- Add Button -->
      <button
        id="btnAddItem"
        class="fixed bottom-8 right-8 w-16 h-16 bg-gradient-to-r from-blue-500 to-purple-600 text-white rounded-full shadow-lg hover:shadow-xl transition-all active:scale-95 flex items-center justify-center z-40"
      >
        <svg
          class="w-8 h-8"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2.5"
            d="M12 4v16m8-8H4"
          ></path>
        </svg>
      </button>
    </div>

    <!-- Modal -->
    <div
      id="modalOverlay"
      class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden items-center justify-center p-4"
    >
      <div
        class="modal-enter bg-white rounded-3xl w-full max-w-lg max-h-[90vh] overflow-y-auto"
      >
        <div
          class="sticky top-0 bg-white rounded-t-3xl p-6 border-b border-gray-100"
        >
          <div class="flex items-center justify-between">
            <h2 id="modalTitle" class="text-2xl font-bold text-gray-800">
              Novo Item
            </h2>
            <button
              id="btnCloseModal"
              class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-gray-100 transition-colors"
            >
              <svg
                class="w-6 h-6 text-gray-400"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M6 18L18 6M6 6l12 12"
                ></path>
              </svg>
            </button>
          </div>
        </div>

        <form id="itemForm" class="p-6 space-y-6">
          <!-- Name -->
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2"
              >Nome do produto</label
            >
            <input
              type="text"
              id="inputName"
              placeholder="Ex: Leite, Arroz, Sabão..."
              class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-blue-400 focus:outline-none transition-colors"
              required
            />
          </div>

          <!-- Category -->
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-3"
              >Categoria</label
            >
            <div class="grid grid-cols-5 gap-2">
              <button
                type="button"
                class="category-btn category-pill flex flex-col items-center gap-1 p-3 rounded-xl border-2 border-gray-100 hover:border-blue-200 transition-all"
                data-category="Limpeza"
              >
                <span class="text-2xl">🧽</span>
                <span class="text-xs font-medium text-gray-600">Limpeza</span>
              </button>
              <button
                type="button"
                class="category-btn category-pill flex flex-col items-center gap-1 p-3 rounded-xl border-2 border-gray-100 hover:border-green-200 transition-all"
                data-category="Geladeira"
              >
                <span class="text-2xl">❄️</span>
                <span class="text-xs font-medium text-gray-600">Geladeira</span>
              </button>
              <button
                type="button"
                class="category-btn category-pill flex flex-col items-center gap-1 p-3 rounded-xl border-2 border-gray-100 hover:border-orange-200 transition-all"
                data-category="Armário"
              >
                <span class="text-2xl">🍞</span>
                <span class="text-xs font-medium text-gray-600">Armário</span>
              </button>
              <button
                type="button"
                class="category-btn category-pill flex flex-col items-center gap-1 p-3 rounded-xl border-2 border-gray-100 hover:border-purple-200 transition-all"
                data-category="Higiene"
              >
                <span class="text-2xl">🧴</span>
                <span class="text-xs font-medium text-gray-600">Higiene</span>
              </button>
              <button
                type="button"
                class="category-btn category-pill flex flex-col items-center gap-1 p-3 rounded-xl border-2 border-gray-100 hover:border-gray-200 transition-all"
                data-category="Outros"
              >
                <span class="text-2xl">📦</span>
                <span class="text-xs font-medium text-gray-600">Outros</span>
              </button>
            </div>
            <input type="hidden" id="inputCategory" required />
          </div>

          <!-- Quantity and Price Row -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-2"
                >Quantidade</label
              >
              <div class="flex items-center gap-2">
                <button
                  type="button"
                  id="btnDecreaseQty"
                  class="w-10 h-10 rounded-xl border-2 border-gray-200 flex items-center justify-center hover:border-blue-400 transition-colors font-bold text-gray-600"
                >
                  -
                </button>
                <input
                  type="number"
                  id="inputQuantity"
                  value="1"
                  min="1"
                  class="flex-1 text-center text-lg font-bold py-2 border-2 border-gray-200 rounded-xl focus:border-blue-400 focus:outline-none"
                />
                <button
                  type="button"
                  id="btnIncreaseQty"
                  class="w-10 h-10 rounded-xl border-2 border-gray-200 flex items-center justify-center hover:border-blue-400 transition-colors font-bold text-gray-600"
                >
                  +
                </button>
              </div>
            </div>
            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-2">
                Preço unit.
                <span class="text-xs text-gray-400 font-normal"
                  >(opcional)</span
                >
              </label>
              <div class="relative">
                <span
                  class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"
                  >R$</span
                >
                <input
                  type="number"
                  id="inputPrice"
                  step="0.01"
                  min="0"
                  placeholder="0,00"
                  class="w-full pl-10 pr-4 py-3 border-2 border-gray-200 rounded-xl focus:border-blue-400 focus:outline-none transition-colors"
                />
              </div>
            </div>
          </div>

          <!-- Submit -->
          <button
            type="submit"
            id="btnSubmit"
            class="w-full py-4 bg-gradient-to-r from-blue-500 to-purple-600 text-white rounded-xl font-semibold text-lg hover:shadow-lg transition-all active:scale-95"
          >
            Adicionar à lista
          </button>
        </form>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
